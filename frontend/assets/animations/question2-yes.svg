  <text x="140" y="18" font-size="8" fill="#D4A5F5" opacity="0" class="heart-p" style="animation-delay:0.7s">&#x2764;</text>
  <text x="60" y="12" font-size="7" fill="#F8A5C2" opacity="0" class="heart-p" style="animation-delay:1.3s">&#x2764;</text>
</svg>
