    <path d="M98 72 Q115 60 132 72 Q136 68 132 63 Q115 53 98 63 Q94 68 98 72Z" fill="#8B4513"/>
    <ellipse cx="115" cy="76" rx="10" ry="4" fill="#F8A5C2"/>
