<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="100%">
  <style>
    @keyframes blink { 0%,95%,100%{opacity:1} 97%{opacity:0} }
    @keyframes bobHead { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes floatPhoto { 0%,100%{transform:translateY(0) rotate(0deg) scale(1)} 50%{transform:translateY(-8px) rotate(5deg) scale(1.05)} }
    @keyframes heartFloat { 0%{opacity:0;transform:translateY(0)scale(0.5)} 40%{opacity:0.6;transform:translateY(-15px)scale(1)} 100%{opacity:0;transform:translateY(-35px)scale(0.3)} }
    .eye { animation: blink 3s ease infinite; }
    .head-bob { animation: bobHead 2.5s ease infinite; }
    .float-photo { animation: floatPhoto 3s ease infinite; }
    .float-photo2 { animation: floatPhoto 3.5s ease infinite; animation-delay: 0.5s; }
    .float-photo3 { animation: floatPhoto 4s ease infinite; animation-delay: 1s; }
    .heart-p { animation: heartFloat 3s ease infinite; }
  </style>
  <rect width="240" height="200" rx="100" fill="#fff8f0" opacity="0.4"/>
  <rect x="75" y="155" width="90" height="8" rx="4" fill="#E0D0C0" opacity="0.3"/>
