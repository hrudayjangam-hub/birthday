    <circle cx="76" cy="97" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="105" cy="97" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M67 76 Q90 64 113 76 Q117 72 113 67 Q90 58 67 67 Q63 72 67 76Z" fill="#6B4226"/>
  </g>
  <rect x="68" y="120" width="44" height="38" rx="10" fill="#D4A5F5"/>
