<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="100%">
  <style>
    @keyframes blink { 0%,95%,100%{opacity:1} 97%{opacity:0} }
    @keyframes bobHead { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes envelopeFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes heartFloat { 0%{opacity:0;transform:translateY(0)scale(0.5)} 40%{opacity:0.6;transform:translateY(-12px)scale(1)} 100%{opacity:0;transform:translateY(-30px)scale(0.3)} }
    @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:0.7;transform:scale(1.2)} }
    .eye { animation: blink 3s ease infinite; }
    .head-bob { animation: bobHead 2.5s ease infinite; }
    .envelope { animation: envelopeFloat 2.5s ease infinite; }
    .heart-p { animation: heartFloat 2.5s ease infinite; }
    .sparkle { animation: sparkle 2s ease infinite; }
  </style>
  <rect width="240" height="200" rx="100" fill="#fff8f0" opacity="0.3"/>
  <g class="head-bob">
    <ellipse cx="48" cy="52" rx="9" ry="6" fill="#FFB8A0" opacity="0.5"/>
    <circle cx="65" cy="92" r="28" fill="#FFE4D6"/>
    <path d="M44 85 Q46 82 49 85" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <path d="M82 85 Q84 82 87 85" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <circle cx="57" cy="89" r="2.5" fill="#5D4037" class="eye"/>
    <circle cx="73" cy="89" r="2.5" fill="#5D4037" class="eye"/>
    <path d="M63 97 Q66 101 69 97" stroke="#E883AE" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="51" cy="94" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="79" cy="94" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M44 73 Q65 60 86 73 Q90 69 86 64 Q65 54 44 64 Q40 69 44 73Z" fill="#6B4226"/>
  </g>
  <rect x="42" y="120" width="46" height="38" rx="10" fill="#D4A5F5"/>
  <rect x="36" y="120" width="58" height="10" rx="5" fill="#C8B6FF"/>
  <rect x="44" y="155" width="12" height="26" rx="5" fill="#FFE4D6"/>
  <rect x="74" y="155" width="12" height="26" rx="5" fill="#FFE4D6"/>
  <rect x="34" y="124" width="10" height="28" rx="5" fill="#FFE4D6"/>
  <rect x="82" y="124" width="10" height="28" rx="5" fill="#FFE4D6"/>
  <g class="envelope">
    <rect x="154" y="120" width="52" height="35" rx="4" fill="#F8A5C2"/>
    <polygon points="154,120 180,140 206,120" fill="#FFD6E0"/>
    <rect x="154" y="120" width="52" height="4" rx="2" fill="#FFF" opacity="0.5"/>
    <circle cx="180" cy="128" r="3" fill="#FFF" opacity="0.6"/>
    <polygon points="180,140 168,150 192,150" fill="#FFF" opacity="0.3"/>
  </g>
  <text x="140" y="170" font-size="7" fill="#E883AE" opacity="0" class="sparkle">&#x2728;</text>
  <text x="200" y="135" font-size="6" fill="#D4A5F5" opacity="0" class="sparkle" style="animation-delay:0.7s">&#x2728;</text>
  <text x="165" y="175" font-size="6" fill="#F8A5C2" opacity="0" class="sparkle" style="animation-delay:1.3s">&#x2728;</text>
  <text x="30" y="18" font-size="8" fill="#F8A5C2" opacity="0" class="heart-p">&#x2764;</text>
  <text x="140" y="22" font-size="7" fill="#D4A5F5" opacity="0" class="heart-p" style="animation-delay:0.5s">&#x2764;</text>
  <text x="100" y="12" font-size="6" fill="#F8A5C2" opacity="0" class="heart-p" style="animation-delay:1.1s">&#x2764;</text>
</svg>
