<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="100%">
  <style>
    @keyframes blink { 0%,95%,100%{opacity:1} 97%{opacity:0} }
    @keyframes hugSway { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-2px) rotate(1deg)} }
    @keyframes bigHeartFloat { 0%{opacity:0;transform:translateY(0)scale(0.5)} 50%{opacity:0.9;transform:translateY(-15px)scale(1.1)} 100%{opacity:0;transform:translateY(-35px)scale(0.3)} }
    @keyframes smallHeart { 0%{opacity:0;transform:translateY(0)scale(0.3)} 50%{opacity:0.6;transform:translateY(-10px)scale(0.8)} 100%{opacity:0;transform:translateY(-25px)scale(0.2)} }
    @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:0.8;transform:scale(1.3)} }
    .eye { animation: blink 3s ease infinite; }
    .hug { animation: hugSway 2s ease infinite; }
    .big-heart { animation: bigHeartFloat 2.5s ease infinite; }
    .small-heart { animation: smallHeart 2s ease infinite; }
    .sparkle { animation: sparkle 2s ease infinite; }
  </style>
  <rect width="240" height="200" rx="100" fill="#fff8f0" opacity="0.4"/>
