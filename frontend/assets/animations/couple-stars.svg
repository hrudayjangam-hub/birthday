<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(0.6)} 50%{opacity:1;transform:scale(1)} }
      @keyframes floatSlow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes glowPulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
      @keyframes moonGlow { 0%,100%{opacity:0.6;r:18} 50%{opacity:1;r:20} }
      .stars g { animation: twinkle 2s ease-in-out infinite; }
      .stars g:nth-child(2) { animation-delay: 0.4s; }
      .stars g:nth-child(3) { animation-delay: 0.8s; }
      .stars g:nth-child(4) { animation-delay: 0.2s; }
      .stars g:nth-child(5) { animation-delay: 0.6s; }
      .stars g:nth-child(6) { animation-delay: 1s; }
      .stars g:nth-child(7) { animation-delay: 0.3s; }
      .couple { animation: floatSlow 4s ease-in-out infinite; }
      .moon { animation: moonGlow 3s ease-in-out infinite; }
      .heart-glow { animation: glowPulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <!-- Night sky bg -->
  <rect width="200" height="200" fill="#1a1a2e" rx="100" ry="100"/>
  <circle cx="100" cy="100" r="90" fill="#16213e" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="155" cy="40" r="18" fill="#f0e6a0" class="moon"/>
  <circle cx="160" cy="36" r="14" fill="#1a1a2e"/>
  <!-- Stars -->
  <g class="stars">
    <g><circle cx="30" cy="30" r="1.5" fill="#fff"/></g>
    <g><circle cx="50" cy="15" r="1" fill="#fff"/></g>
    <g><circle cx="25" cy="60" r="1.2" fill="#fff"/></g>
    <g><circle cx="45" cy="80" r="0.8" fill="#fff"/></g>
    <g><circle cx="170" cy="25" r="1.2" fill="#fff"/></g>
    <g><circle cx="180" cy="55" r="0.8" fill="#fff"/></g>
    <g><circle cx="140" cy="15" r="1" fill="#fff"/></g>
  </g>
  <!-- Ground -->
  <ellipse cx="100" cy="150" rx="60" ry="8" fill="#0f3460" opacity="0.5"/>
  <!-- Couple silhouette sitting -->
  <g class="couple">
    <ellipse cx="80" cy="130" rx="16" ry="20" fill="#2d2d44"/>
    <circle cx="80" cy="108" r="11" fill="#2d2d44"/>
    <ellipse cx="120" cy="130" rx="16" ry="20" fill="#2d2d44"/>
    <circle cx="120" cy="108" r="11" fill="#2d2d44"/>
    <!-- Arm around -->
    <path d="M90 118 Q100 112 110 118" stroke="#2d2d44" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Heart glow between them -->
  <text x="100" y="115" font-size="16" text-anchor="middle" fill="#f8a5c2" class="heart-glow">&#x2764;</text>
  <!-- Shooting star -->
  <line x1="20" y1="20" x2="40" y2="40" stroke="#fff" stroke-width="0.8" opacity="0.4" stroke-linecap="round">
    <animate attributeName="opacity" values="0.4;0;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="20;60;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="20;20;20" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
