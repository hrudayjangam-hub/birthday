  <rect x="137" y="124" width="10" height="30" rx="5" fill="#FFE4D6"/>
  <text x="25" y="22" font-size="9" fill="#F8A5C2" opacity="0" class="heart-p">&#x2764;</text>
  <text x="140" y="20" font-size="7" fill="#D4A5F5" opacity="0" class="heart-p" style="animation-delay:0.6s">&#x2764;</text>
  <text x="90" y="12" font-size="8" fill="#F8A5C2" opacity="0" class="heart-p" style="animation-delay:1.2s">&#x2764;</text>
</svg>
