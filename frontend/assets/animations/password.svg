<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="100%">
  <style>
    @keyframes blink { 0%,95%,100%{opacity:1} 97%{opacity:0} }
    @keyframes bobHead { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes lockPulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.05)} }
    @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:0.8;transform:scale(1.2)} }
    @keyframes heartFloat { 0%{opacity:0;transform:translateY(0)scale(0.5)} 50%{opacity:0.7;transform:translateY(-12px)scale(1)} 100%{opacity:0;transform:translateY(-28px)scale(0.3)} }
    .eye { animation: blink 3s ease infinite; }
    .head-bob { animation: bobHead 2.5s ease infinite; }
    .lock { animation: lockPulse 2s ease infinite; transform-origin:175px 110px; }
    .sparkle { animation: sparkle 2s ease infinite; }
    .heart-p { animation: heartFloat 2.5s ease infinite; }
  </style>
  <rect width="240" height="200" rx="100" fill="#fff8f0" opacity="0.3"/>
  <g class="lock">
    <rect x="165" y="110" width="20" height="18" rx="4" fill="#F8A5C2"/>
    <path d="M168 110 L168 100 Q175 90 182 100 L182 110" stroke="#E883AE" stroke-width="3" fill="none"/>
    <circle cx="175" cy="118" r="2" fill="#FFF"/>
  </g>
  <text x="160" y="145" font-size="7" fill="#E883AE" opacity="0" class="sparkle">&#x2728;</text>
  <text x="190" y="108" font-size="6" fill="#D4A5F5" opacity="0" class="sparkle" style="animation-delay:0.8s">&#x2728;</text>
  <g class="head-bob">
    <ellipse cx="48" cy="52" rx="10" ry="7" fill="#FFB8A0" opacity="0.5"/>
    <circle cx="65" cy="92" r="30" fill="#FFE4D6"/>
    <path d="M42 85 Q44 82 47 85" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <path d="M85 85 Q87 82 90 85" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <circle cx="57" cy="89" r="2.5" fill="#5D4037" class="eye"/>
    <circle cx="74" cy="89" r="2.5" fill="#5D4037" class="eye"/>
    <path d="M63 98 Q66 102 69 98" stroke="#E883AE" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="51" cy="96" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="80" cy="96" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M44 73 Q65 60 86 73 Q90 69 86 64 Q65 54 44 64 Q40 69 44 73Z" fill="#6B4226"/>
  </g>
  <rect x="42" y="120" width="46" height="42" rx="11" fill="#D4A5F5"/>
  <rect x="36" y="120" width="58" height="11" rx="5" fill="#C8B6FF"/>
  <rect x="44" y="158" width="13" height="28" rx="5" fill="#FFE4D6"/>
  <rect x="74" y="158" width="13" height="28" rx="5" fill="#FFE4D6"/>
  <rect x="34" y="124" width="11" height="30" rx="5" fill="#FFE4D6"/>
  <rect x="82" y="124" width="11" height="30" rx="5" fill="#FFE4D6"/>
  <g class="head-bob" style="animation-delay:0.3s">
    <ellipse cx="125" cy="52" rx="9" ry="6" fill="#FFB8A0" opacity="0.5"/>
    <circle cx="118" cy="92" r="28" fill="#FFE4D6"/>
    <path d="M100 85 Q102 82 105 85" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <path d="M130 85 Q132 82 135 85" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <circle cx="111" cy="89" r="2.5" fill="#5D4037" class="eye"/>
    <circle cx="126" cy="89" r="2.5" fill="#5D4037" class="eye"/>
    <path d="M116 97 Q119 101 122 97" stroke="#E883AE" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="107" cy="94" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="131" cy="94" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M102 73 Q118 62 134 73 Q138 69 134 64 Q118 55 102 64 Q98 69 102 73Z" fill="#8B4513"/>
    <ellipse cx="118" cy="76" rx="9" ry="3.5" fill="#F8A5C2"/>
  </g>
  <rect x="103" y="120" width="40" height="42" rx="11" fill="#F8A5C2"/>
  <rect x="97" y="120" width="52" height="11" rx="5" fill="#FFD6E0"/>
