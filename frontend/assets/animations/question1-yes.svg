<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="100%">
  <style>
    @keyframes blink { 0%,95%,100%{opacity:1} 97%{opacity:0} }
    @keyframes bobHead { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes handHold { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:0.8;transform:scale(1.2)} }
    @keyframes heartFloat { 0%{opacity:0;transform:translateY(0) scale(0.5)} 50%{opacity:0.7;transform:translateY(-15px) scale(1)} 100%{opacity:0;transform:translateY(-35px) scale(0.3)} }
    .eye { animation: blink 3s ease infinite; }
    .head-bob { animation: bobHead 2.5s ease infinite; }
    .hand-heart { animation: handHold 2s ease infinite; }
    .sparkle { animation: sparkle 2s ease infinite; }
    .heart-particle { animation: heartFloat 2.5s ease infinite; }
  </style>
  <rect width="240" height="200" rx="100" fill="#fff8f0" opacity="0.4"/>
  <g class="head-bob">
    <ellipse cx="75" cy="52" rx="11" ry="7" fill="#FFB8A0" opacity="0.5"/>
    <circle cx="95" cy="95" r="32" fill="#FFE4D6"/>
    <path d="M68 87 Q70 84 73 87" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <path d="M118 87 Q120 84 123 87" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <circle cx="85" cy="91" r="2.5" fill="#5D4037" class="eye"/>
    <circle cx="106" cy="91" r="2.5" fill="#5D4037" class="eye"/>
    <path d="M91 100 Q95.5 105 100 100" stroke="#E883AE" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="78" cy="97" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="112" cy="97" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M70 72 Q95 58 120 72 Q124 68 120 63 Q95 52 70 63 Q66 68 70 72Z" fill="#6B4226"/>
    <path d="M85 63 Q95 55 105 63" fill="#6B4226"/>
  </g>
  <rect x="70" y="125" width="50" height="45" rx="12" fill="#D4A5F5"/>
  <rect x="62" y="125" width="66" height="12" rx="6" fill="#C8B6FF"/>
  <rect x="70" y="165" width="14" height="30" rx="5" fill="#FFE4D6"/>
  <rect x="106" y="165" width="14" height="30" rx="5" fill="#FFE4D6"/>
  <rect x="60" y="130" width="12" height="32" rx="6" fill="#FFE4D6"/>
  <g class="hand-heart">
    <rect x="112" y="132" width="10" height="28" rx="5" fill="#FFE4D6"/>
  </g>
  <g class="head-bob" style="animation-delay:0.3s">
    <ellipse cx="165" cy="52" rx="10" ry="7" fill="#FFB8A0" opacity="0.5"/>
    <circle cx="145" cy="95" r="30" fill="#FFE4D6"/>
    <circle cx="115" cy="103" r="5" fill="#D4A5F5" opacity="0.3"/>
    <path d="M133 87 Q135 84 138 87" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <path d="M153 87 Q155 84 158 87" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <circle cx="139" cy="91" r="2.5" fill="#5D4037" class="eye"/>
    <circle cx="152" cy="91" r="2.5" fill="#5D4037" class="eye"/>
    <path d="M143 99 Q146 103 149 99" stroke="#E883AE" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="134" cy="96" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="157" cy="96" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M122 73 Q145 60 168 73 Q172 69 168 64 Q145 54 122 64 Q118 69 122 73Z" fill="#8B4513"/>
    <ellipse cx="145" cy="78" rx="12" ry="4" fill="#F8A5C2"/>
  </g>
  <rect x="125" y="125" width="45" height="45" rx="12" fill="#F8A5C2"/>
  <rect x="118" y="125" width="60" height="12" rx="6" fill="#FFD6E0"/>
  <rect x="130" y="165" width="12" height="30" rx="5" fill="#FFE4D6"/>
  <rect x="155" y="165" width="12" height="30" rx="5" fill="#FFE4D6"/>
  <rect x="161" y="130" width="10" height="28" rx="5" fill="#FFE4D6"/>
  <path d="M118 140 L112 145 Q110 150 115 152 L120 148Z" fill="#F8A5C2" class="hand-heart" style="animation-delay:0.5s"/>
  <text x="80" y="18" font-size="12" fill="#F8A5C2" opacity="0" class="heart-particle">&#x2764;</text>
  <text x="160" y="22" font-size="10" fill="#D4A5F5" opacity="0" class="heart-particle" style="animation-delay:0.8s">&#x2764;</text>
  <text x="50" y="30" font-size="8" fill="#F8A5C2" opacity="0" class="heart-particle" style="animation-delay:1.5s">&#x2764;</text>
  <text x="180" y="15" font-size="9" fill="#D4A5F5" opacity="0" class="heart-particle" style="animation-delay:0.3s">&#x2764;</text>
  <text x="110" y="10" font-size="7" fill="#F8A5C2" opacity="0" class="sparkle">&#x2728;</text>
  <text x="40" y="55" font-size="6" fill="#D4A5F5" opacity="0" class="sparkle" style="animation-delay:1s">&#x2728;</text>
  <text x="190" y="45" font-size="7" fill="#F8A5C2" opacity="0" class="sparkle" style="animation-delay:0.6s">&#x2728;</text>
</svg>
