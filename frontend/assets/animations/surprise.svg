<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="100%">
  <style>
    @keyframes blink { 0%,95%,100%{opacity:1} 97%{opacity:0} }
    @keyframes bobHead { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes giftOpen { 0%{transform:scaleY(0.3) translateY(20px)} 50%{transform:scaleY(1.1) translateY(0)} 100%{transform:scaleY(1) translateY(0)} }
    @keyframes sparkleBurst { 0%{opacity:0;transform:scale(0)rotate(0deg)} 50%{opacity:1;transform:scale(1.5)rotate(180deg)} 100%{opacity:0;transform:scale(0)rotate(360deg)} }
    @keyframes confettiFall { 0%{opacity:1;transform:translateY(-20px)rotate(0deg)} 100%{opacity:0;transform:translateY(40px)rotate(360deg)} }
    @keyframes heartFloat { 0%{opacity:0;transform:translateY(0)scale(0.3)} 50%{opacity:0.9;transform:translateY(-15px)scale(1.2)} 100%{opacity:0;transform:translateY(-35px)scale(0.3)} }
    @keyframes starPulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.9;transform:scale(1.3)} }
    .eye { animation: blink 3s ease infinite; }
    .head-bob { animation: bobHead 2.5s ease infinite; }
    .gift-open { animation: giftOpen 1s ease forwards; transform-origin: bottom; }
    .sparkle-burst { animation: sparkleBurst 1.2s ease infinite; }
    .confetti { animation: confettiFall 1.5s ease infinite; }
    .star-pulse { animation: starPulse 1.5s ease infinite; }
    .heart-p { animation: heartFloat 2s ease infinite; }
  </style>
  <rect width="240" height="200" rx="100" fill="#fff8f0" opacity="0.3"/>
  <g class="head-bob">
    <ellipse cx="60" cy="55" rx="9" ry="6" fill="#FFB8A0" opacity="0.5"/>
    <circle cx="75" cy="95" r="28" fill="#FFE4D6"/>
    <path d="M55 88 Q57 85 60 88" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <path d="M93 88 Q95 85 98 88" stroke="#D4A5F5" stroke-width="1.5" fill="none"/>
    <circle cx="67" cy="92" r="2.5" fill="#5D4037" class="eye"/>
    <circle cx="83" cy="92" r="2.5" fill="#5D4037" class="eye"/>
    <path d="M73 100 Q76 104 79 100" stroke="#E883AE" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="61" cy="97" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <circle cx="89" cy="97" r="3.5" fill="#FFB8A0" opacity="0.6"/>
    <path d="M54 76 Q75 64 96 76 Q100 72 96 67 Q75 58 54 67 Q50 72 54 76Z" fill="#6B4226"/>
  </g>
  <rect x="52" y="122" width="46" height="38" rx="10" fill="#D4A5F5"/>
  <rect x="46" y="122" width="58" height="10" rx="5" fill="#C8B6FF"/>
  <rect x="54" y="157" width="12" height="26" rx="5" fill="#FFE4D6"/>
  <rect x="84" y="157" width="12" height="26" rx="5" fill="#FFE4D6"/>
  <rect x="44" y="126" width="10" height="28" rx="5" fill="#FFE4D6"/>
  <rect x="92" y="126" width="10" height="28" rx="5" fill="#FFE4D6"/>
  <g class="gift-open">
    <rect x="140" y="132" width="48" height="40" rx="6" fill="#F8A5C2"/>
    <rect x="140" y="132" width="48" height="8" rx="3" fill="#FFF" opacity="0.7"/>
    <rect x="162" y="132" width="4" height="40" fill="#FFF" opacity="0.7"/>
    <circle cx="164" cy="132" r="8" fill="#FFF" opacity="0.8"/>
    <path d="M158 125 L170 125 C170 118 158 118 158 125Z" fill="#F8A5C2" opacity="0.6"/>
    <rect x="140" y="148" width="48" height="24" rx="0" fill="#F8A5C2" opacity="0.9"/>
  </g>
  <text x="110" y="130" font-size="8" fill="#F8A5C2" opacity="0" class="confetti" style="animation-delay:0.2s">&#x2B50;</text>
  <text x="200" y="140" font-size="7" fill="#D4A5F5" opacity="0" class="confetti" style="animation-delay:0.5s">&#x2B50;</text>
  <text x="120" y="150" font-size="6" fill="#FFD6E0" opacity="0" class="confetti" style="animation-delay:0.8s">&#x2B50;</text>
  <text x="195" y="155" font-size="9" fill="#F8A5C2" opacity="0" class="confetti" style="animation-delay:1.1s">&#x2B50;</text>
  <text x="115" y="115" font-size="10" fill="#F8A5C2" opacity="0" class="sparkle-burst" style="animation-delay:0s">&#x2728;</text>
  <text x="200" y="115" font-size="9" fill="#D4A5F5" opacity="0" class="sparkle-burst" style="animation-delay:0.3s">&#x2728;</text>
  <text x="155" y="115" font-size="8" fill="#FFD6E0" opacity="0" class="sparkle-burst" style="animation-delay:0.6s">&#x2728;</text>
  <text x="25" y="22" font-size="8" fill="#F8A5C2" opacity="0" class="heart-p">&#x2764;</text>
  <text x="180" y="20" font-size="7" fill="#D4A5F5" opacity="0" class="heart-p" style="animation-delay:0.7s">&#x2764;</text>
  <text x="210" y="30" font-size="6" fill="#F8A5C2" opacity="0" class="heart-p" style="animation-delay:1.3s">&#x2764;</text>
  <circle cx="164" cy="152" r="4" fill="#FFE4D6" class="star-pulse"/>
  <circle cx="155" cy="142" r="3" fill="#FFF" class="star-pulse" style="animation-delay:0.4s"/>
  <circle cx="173" cy="145" r="2.5" fill="#FFD6E0" class="star-pulse" style="animation-delay:0.8s"/>
</svg>
